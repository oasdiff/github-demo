openapi: 3.0.1
info:
  title: Tufin
  version: "4.0"
servers:
- url: https://localhost:8080
components:
  parameters:
    groupId:
      in: query
      name: groupId
      required: true
      schema:
        type: string
  schemas:
    GroupView:
      type: object
      properties:
        data:
          type: object
          properties:
            created:
              type: string
              format: date-time
              readOnly: true
            id:
              type: string
              readOnly: true
            name:
              type: string
            description:
              type: string
          required:
            - name
paths:
  /api/v1.2/groups:
    post:
      tags:
       - Group
      operationId: createOneGroup
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupView'
        description: Creates one project.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupView'
          description: SUCCESS
      summary: Create a Project
  /api/v1.0/groups/{groupId}:
    get:
      tags:
       - Group
      operationId: getOneGroup
      parameters:
        - $ref: '#/components/parameters/groupId'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupView'
          description: SUCCESS
      summary: Get a Project
